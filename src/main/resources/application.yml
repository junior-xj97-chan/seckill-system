server:
  port: 8080

spring:
  application:
    name: seckill-system

  # MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/seckill_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: "123456"
      database: 1
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

# JWT 配置
jwt:
  secret: SeckillSystemJwtSecretKey2026VeryLongSecretKeyForHS256Algorithm!!
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# 秒杀配置
seckill:
  # 秒杀地址加密盐值
  salt: "seckill_salt_2026"
  # 订单超时时间（分钟）
  order-timeout: 15
  # 限流：每秒最大请求数
  rate-limit: 500
